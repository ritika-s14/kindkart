<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - KindKart</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">KindKart</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="index.html#services">SERVICES</a></li>
        <li><a href="orphanages.html">ORPHANAGES</a></li>

        <li><a href="register.html">REGISTER</a></li>
      </ul>
    </div>
  </nav>

  <section class="modern-form-section">
    <div class="login-card">
      <h2>Login to Your Account</h2>

      <form class="auth-form" action="backend/login.php" method="POST">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="btn-primary">Login</button>
        <p class="form-footer">Don't have an account? <a href="signup.html">Sign up here</a></p>
        <p class="form-footer"><a href="#">Forgot Password?</a></p>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2023 KindKart. All rights reserved.</p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
